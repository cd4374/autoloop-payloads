rules:
  - id: ROOT-001
    title: 所有 P0 子 payload 已完成
    severity: blocking
    evaluator: script
    pass_condition: "所有 P0 子 loop 正常完成（status=keep）或达到 max_iter"
    fix_hint: "运行未完成的 P0 子 payload"
    check:
      type: subpayload_done
      payload: ./runtime-proof-payload
      status: keep

  - id: ROOT-002
    title: 论文核心文件已生成
    severity: blocking
    evaluator: script
    pass_condition: ".paper/output/draft.tex 存在且非空"
    fix_hint: "运行 writing-loop 生成论文草稿"
    check:
      type: files_exist
      files:
        - .paper/output/draft.tex

  - id: ROOT-003
    title: 所有 P1 子 payload 已完成
    severity: advisory
    evaluator: script
    pass_condition: "所有 P1 子 loop 已完成"
    fix_hint: "运行未完成的 P1 子 payload"
    check:
      type: subpayload_done
      payload: ./dataset-license-payload
      status: any
