rules:
  - id: LIT-001
    title: 文献语料索引存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/lit-corpus-index.json 存在且包含语料条目"
    fix_hint: "运行 lit-loop 生成文献语料索引"
    check:
      type: json_gates
      state_dir: .paper/state
      gates:
        - file: lit-corpus-index.json
          conditions:
            - path: $.corpus
              op: non_empty_list
