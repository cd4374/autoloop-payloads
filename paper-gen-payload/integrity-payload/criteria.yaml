rules:
- id: INT-001
  title: 数据真实性
  severity: blocking
  evaluator: llm
  pass_condition: "所有实验数字可从 .paper/output/logs/run_*.log 追溯；无不可能值（如 100.00% 精度）；无非 cherry-picking。"
  fix_hint: "确保所有数字来自真实实验运行。使用 LLM 评估与日志一致性。"
  fix_skill: loop-run
  fix_skill_args: "PAYLOAD=paper-gen-payload/exp-payload"

- id: INT-002
  title: 无图像操纵
  severity: blocking
  evaluator: llm
  pass_condition: "所有 figure 与论文数据一致，无选择性展示或增强。如有图像处理，需在 caption 中披露。"
  fix_hint: "确保图像与原始数据一致，披露所有图像处理步骤。"
  fix_skill: loop-run
  fix_skill_args: "PAYLOAD=paper-gen-payload/figure-payload"

- id: INT-003
  title: 无抄袭（语义验证）
  severity: blocking
  evaluator: llm
  pass_condition: "正文写作使用自己的语言，无大段复制粘贴痕迹，引用格式正确。"
  fix_hint: "重写重复内容，确保引用格式正确。注意：正式投稿前必须使用 iThenticate/Turnitin 查重。"

- id: INT-004
  title: Conflict of Interest 声明
  severity: blocking
  evaluator: script
  pass_condition: "draft.tex 包含 Conflict of Interest 声明或'No Conflict of Interest'声明。"
  fix_hint: "添加 Conflict of Interest 声明。"

- id: INT-005
  title: 许可证归属
  severity: blocking
  evaluator: script
  pass_condition: "使用第三方图像/代码时，在论文中标注许可证来源；不使用第三方内容时视为通过。"
  fix_hint: "添加许可证归属信息，或移除未授权的第三方内容。"

- id: INT-006
  title: 神经网络可视化披露
  severity: blocking
  evaluator: script
  pass_condition: "若使用神经网络可视化方法（attention map、saliency map、t-SNE、Grad-CAM 等），在 method 或 appendix 中披露生成方法和工具。"
  fix_hint: "添加神经网络可视化方法披露，包括使用的工具和参数设置。"

- id: INT-007
  title: 无图像操纵信号
  severity: blocking
  evaluator: script
  pass_condition: "draft.tex 不包含图像操纵披露词（如'cropped'、'contrast enhanced'、'brightness adjusted'），或已添加说明。"
  fix_hint: "移除操纵图像或添加披露说明。"

- id: INT-008
  title: 无抄袭信号
  severity: blocking
  evaluator: script
  pass_condition: "draft.tex 不包含版权声明混入正文等明显抄袭信号（如'copyright'、'all rights reserved'）。"
  fix_hint: "使用专业查重工具查重。重写重复内容。"