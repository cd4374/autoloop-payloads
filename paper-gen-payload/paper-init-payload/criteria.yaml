rules:
  - id: INIT-001
    title: 计算环境已检测
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/compute-env.json 存在且包含 device 字段"
    fix_hint: "运行 scripts/compute-detect.sh 检测计算环境"
    check:
      type: json_fields
      file: .paper/state/compute-env.json
      fields:
        - name: device
          types: [string]

  - id: INIT-002
    title: 模板选择状态已初始化
    severity: advisory
    evaluator: script
    pass_condition: ".paper/state/template-selection.json 存在且包含 selected_template_id"
    fix_hint: "初始化模板选择状态"
    check:
      type: json_fields
      file: .paper/state/template-selection.json
      fields:
        - name: selected_template_id
          types: [string]
