rules:
  - id: INIT-001
    title: 顶级目录结构完整
    severity: blocking
    evaluator: script
    pass_condition: ".paper/ 目录存在且包含 state/、input/、output/ 子目录；.paper/input/idea.md 存在且非空。"
    fix_hint: "创建目录结构：mkdir -p .paper/state .paper/input .paper/output；创建 idea.md 描述研究想法。"
    check:
      type: dir_structure
      dirs:
        - .paper/state
        - .paper/input
        - .paper/output
      files:
        - dir: .paper/input
          pattern: idea.md

  - id: INIT-002
    title: paper-type.json 已初始化
    severity: blocking
    evaluator: script
    depends_on: ["INIT-001"]
    pass_condition: ".paper/state/paper-type.json 存在且包含 venue、paper_domain、derived_thresholds（非空 dict）。"
    fix_hint: "创建 paper-type.json，从父 payload session.md 读取配置，计算 derived_thresholds。"
    check:
      type: json_fields
      file: .paper/state/paper-type.json
      fields:
        - name: venue
          types: [string]
        - name: paper_domain
          types: [string]
        - name: derived_thresholds
          types: [dict]

  - id: INIT-003
    title: draft.tex 已生成
    severity: blocking
    evaluator: script
    depends_on: ["INIT-002"]
    pass_condition: ".paper/output/draft.tex 存在且包含 \\documentclass、\\begin{document}、\\end{document} 结构。"
    fix_hint: "根据 idea.md 和 paper-type.json 生成 draft.tex：包含 Abstract、Introduction、Related Work、Method、Experiments、Conclusion、Limitations，每章有具体内容。"
    check:
      type: latex_structure
      file: .paper/output/draft.tex
      requires:
        - '\\documentclass'
        - '\\begin{document}'
        - '\\end{document}'

  - id: INIT-004
    title: references.bib 已生成
    severity: blocking
    evaluator: script
    depends_on: ["INIT-003"]
    pass_condition: ".paper/output/references.bib 存在且至少包含 5 个有效的 BibTeX 条目。"
    fix_hint: "提取 draft.tex 中的 \\cite{}，搜索相关文献，生成 BibTeX 条目，确保包含近五年文献。"
    check:
      type: count
      source: .paper/output/references.bib
      pattern: '^@[a-zA-Z]+\{'
      op: ge
      threshold: 5

  - id: INIT-005
    title: 实验代码已生成
    severity: blocking
    evaluator: script
    depends_on: ["INIT-003"]
    pass_condition: ".paper/output/code/main.py 存在且包含基本结构（>=10 行），且可编译。"
    fix_hint: "根据 draft.tex 中的 Method 和 Experiments 生成 Python 实验代码，使用真实数据集。"
    check:
      type: compound
      parts:
        - type: count
          source: .paper/output/code/main.py
          pattern: '^.+'
          op: ge
          threshold: 10
        - type: python_compile
          file: .paper/output/code/main.py

  - id: INIT-006
    title: 计算环境已检测并记录
    severity: blocking
    evaluator: script
    depends_on: ["INIT-001"]
    pass_condition: ".paper/state/compute-env.json 存在且包含 device（ssh_gpu/cuda/mps/cpu 之一）、available 字段。"
    fix_hint: "运行 scripts/compute-detect.sh 检测计算环境（SSH GPU → CUDA → MPS → CPU），将结果写入 compute-env.json。"
    check:
      type: json_fields
      file: .paper/state/compute-env.json
      fields:
        - name: device
          types: [string]
        - name: available
          types: [string, bool]
