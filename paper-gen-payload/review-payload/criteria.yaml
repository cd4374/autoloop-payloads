rules:
- id: REV-001
  title: 论文结构完整（客观）
  severity: blocking
  evaluator: script
  pass_condition: "draft.tex 包含 Abstract/Introduction/Method/Experiments/Conclusion/Limitations 章节；Abstract 字数 <= abstract_max_words。"
  fix_hint: "补充缺失章节，调整 Abstract 长度。"

- id: REV-002
  title: 跨模型审查综合评分
  severity: blocking
  evaluator: llm
  depends_on: ["REV-001"]
  pass_condition: "外部审查综合评分 >= 85/100，无 blocking issue。"
  fix_hint: "根据审查反馈修改论文，优先修复 blocking issues。"

- id: REV-003
  title: 无 blocking issue
  severity: blocking
  evaluator: llm
  depends_on: ["REV-002"]
  pass_condition: "所有 blocking issues 已解决。"
  fix_hint: "逐一解决每个 blocking issue。"

- id: REV-004
  title: 学术诚信通过
  severity: advisory
  evaluator: llm
  pass_condition: "无数据伪造、无图像操纵、无抄袭（相似度 <= 15%）。"
  fix_hint: "修复学术诚信问题。"
  fix_skill: loop-run
  fix_skill_args: "PAYLOAD=paper-gen-payload/integrity-payload"

- id: REV-005
  title: 统计合规
  severity: advisory
  evaluator: llm
  pass_condition: "包含 mean±std、p-value/CI/effect size，无 cherry-picking。"
  fix_hint: "修复统计规范问题。"
  fix_skill: loop-run
  fix_skill_args: "PAYLOAD=paper-gen-payload/stat-payload"