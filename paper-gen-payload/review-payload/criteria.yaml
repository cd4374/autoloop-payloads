rules:
  - id: REVIEW-001
    title: 审查状态文件存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/review-status.json 存在且可解析"
    fix_hint: "运行 review-loop 生成审查状态"
    check:
      type: json_fields
      file: .paper/state/review-status.json
      fields:
        - name: overall_score
          types: [int, float]

  - id: REVIEW-002
    title: 综合评分达标
    severity: blocking
    evaluator: script
    depends_on: ["REVIEW-001"]
    pass_condition: "综合评分 >= 85"
    fix_hint: "改进论文质量直到评分达标"
    check:
      type: json_gates
      state_dir: .paper/state
      gates:
        - file: review-status.json
          conditions:
            - path: $.overall_score
              op: ge
              value: 85
