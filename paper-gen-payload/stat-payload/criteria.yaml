rules:
  - id: STAT-001
    title: 统计状态文件存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/stat-status.json 存在且 pass=true"
    fix_hint: "运行 stat-loop 检查统计规范"
    check:
      type: json_gates
      state_dir: .paper/state
      gates:
        - file: stat-status.json
          conditions:
            - path: $.pass
              op: eq
              value: true
