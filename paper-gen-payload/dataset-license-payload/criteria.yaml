rules:
  - id: DATA-001
    title: 数据集清单存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/dataset-inventory.json 存在且可解析"
    fix_hint: "生成数据集清单"
    check:
      type: json_fields
      file: .paper/state/dataset-inventory.json
      fields:
        - name: datasets
          types: [list]
