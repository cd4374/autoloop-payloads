rules:
  - id: LINT-001
    title: payload 协议完整性
    severity: blocking
    evaluator: script
    pass_condition: "所有 payload 目录包含 criteria.yaml 和 session.md"
    fix_hint: "补充缺失的 payload 文件"
    check:
      type: command
      cmd: "find . -maxdepth 2 -name 'session.md' | wc -l"
      expects: exit_code
      timeout: 10
