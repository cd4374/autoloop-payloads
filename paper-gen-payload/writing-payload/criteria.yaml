rules:
  - id: WRITING-001
    title: 论文草稿存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/output/draft.tex 存在且非空"
    fix_hint: "生成论文草稿"
    check:
      type: files_exist
      files:
        - .paper/output/draft.tex

  - id: WRITING-002
    title: 模板选择状态一致
    severity: advisory
    evaluator: script
    pass_condition: ".paper/state/template-selection.json 存在"
    fix_hint: "初始化模板选择状态"
    check:
      type: files_exist
      files:
        - .paper/state/template-selection.json
