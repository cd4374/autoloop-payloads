rules:
  - id: NOVELTY-001
    title: novelty 报告存在且评分达标
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/novelty-report.json 存在且 overall_score >= 5"
    fix_hint: "运行 novelty-check 生成报告"
    check:
      type: json_gates
      state_dir: .paper/state
      gates:
        - file: novelty-report.json
          conditions:
            - path: $.overall_score
              op: ge
              value: 5
