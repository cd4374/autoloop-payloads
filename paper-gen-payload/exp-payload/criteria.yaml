rules:
- id: EXP-001
  title: 实验代码可运行
  severity: blocking
  evaluator: script
  pass_condition: "code/main.py 可编译（python3 -m py_compile 通过）。"
  fix_hint: "修复代码语法错误，确保可运行。"

- id: EXP-002
  title: 实验结果真实且 Ablation 完整
  severity: blocking
  evaluator: llm
  depends_on: ["EXP-001", "EXP-003", "EXP-005"]
  pass_condition: "所有数字来自 logs/run_*.log，无捏造数据；require_ablation=true 时 Ablation 覆盖所有关键组件。"
  fix_hint: "运行实验获取真实结果，补充 Ablation Study。"

- id: EXP-003
  title: 独立运行次数达标
  severity: blocking
  evaluator: script
  depends_on: ["EXP-001"]
  pass_condition: "logs/ 目录下 run_*.log 数量 >= min_experiment_runs (默认 3)。"
  fix_hint: "增加独立运行次数。"

- id: EXP-004
  title: 数据集真实可用
  severity: blocking
  evaluator: script
  depends_on: ["EXP-001"]
  pass_condition: "代码使用真实数据集加载（torchvision/tensorflow/sklearn/huggingface）或下载逻辑，无随机生成替代。"
  fix_hint: "替换为真实数据集，引用版本/DOI。"

- id: EXP-005
  title: 可复现性完整
  severity: blocking
  evaluator: script
  depends_on: ["EXP-001"]
  pass_condition: "reproducibility.json 包含 hardware/software/hyperparameters/dataset/preprocessing；code/main.py 包含随机种子固定；超参数在论文中有说明。"
  fix_hint: "补充 reproducibility.json 和随机种子设置。"

- id: EXP-006
  title: 实验结果可追溯
  severity: blocking
  evaluator: script
  depends_on: ["EXP-003"]
  pass_condition: "所有报告数字可从 logs/run_*.log 追溯。"
  fix_hint: "确保日志包含完整指标数值。"

- id: EXP-007
  title: GPU 信息记录（advisory）
  severity: advisory
  evaluator: script
  depends_on: ["EXP-001"]
  pass_condition: "reproducibility.json 记录 GPU 型号和 CUDA 版本。"
  fix_hint: "在代码中添加 CUDA 检测，记录 GPU 信息。"

- id: EXP-008
  title: 计算环境被实验代码使用
  severity: blocking
  evaluator: script
  depends_on: ["EXP-001"]
  pass_condition: "compute-env.json 存在且 code/main.py 包含 torch.device/cuda.is_available/mps.is_available 等 device 选择逻辑。"
  fix_hint: "运行 compute-detect.sh；代码中设置 device = torch.device('cuda'/'mps'/'cpu')。"