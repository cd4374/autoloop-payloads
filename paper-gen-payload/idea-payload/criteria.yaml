rules:
  - id: IDEA-001
    title: idea 状态文件存在
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/idea-candidates.json 存在且可解析"
    fix_hint: "运行 idea-loop 生成候选想法池"
    check:
      type: json_fields
      file: .paper/state/idea-candidates.json
      fields:
        - name: candidates
          types: [list]

  - id: IDEA-002
    title: novelty 报告存在且评分达标
    severity: blocking
    evaluator: script
    pass_condition: ".paper/state/novelty-report.json 存在且 overall_score >= 5"
    fix_hint: "运行 novelty-check-payload 生成新颖性报告"
    check:
      type: json_gates
      state_dir: .paper/state
      gates:
        - file: novelty-report.json
          conditions:
            - path: $.overall_score
              op: ge
              value: 5
